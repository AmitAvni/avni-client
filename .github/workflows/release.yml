name: Release

# Build native Linux + Windows app-images and attach them to a GitHub Release.
# Trigger by pushing a version tag, e.g. `git tag v1.0.0 && git push origin v1.0.0`.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: AvniClient-linux-x64.tar.gz
          - os: windows-latest
            artifact: AvniClient-windows-x64.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build self-contained app-image
        shell: bash
        run: bash ./gradlew :launcher:jpackage --no-daemon --stacktrace

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: tar -czf "${{ matrix.artifact }}" -C launcher/build/jpackage AvniClient

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path launcher/build/jpackage/AvniClient -DestinationPath "${{ matrix.artifact }}"

      - name: Attach to release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact }}
          fail_on_unmatched_files: true
